# .checkmake.ini — checkmake configuration
# https://github.com/checkmake/checkmake

[minphony]
targets=all,clean,test,lint,shellcheck,zsh-check,yamllint,markdownlint,pre-commit,checkmake

[maxbodylength]
# Max lines per recipe body — keep recipes concise
body_length=25

[phonydeclared]
# All targets that don't produce files should be .PHONY
enabled=true
